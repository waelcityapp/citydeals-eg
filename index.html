            font-size: 15px;

        .modern-input:focus {

        .modern-input:disabled {

        .file-input-wrapper {

        .file-input {
            position: absolute;
            opacity: 0;

            color: #828282;
            border: 1px solid rgba(255, 255, 255, 0.05);

        .action-btn {

            justify-content: center;

            padding: 16px 20px;
            background: linear-gradient(135deg, #e63c3c 0%, #c62828 100%);

            border-radius: 16px;

            { value: '16', label: 'Shops', color: '#4caf50' },
        ];

        // ==================== HOME PAGE COMPONENTS ====================

        const HomeHeader = () => {
            return (
                <div className="header">
                    <div className="header-top">
                        <div className="logo">
                            <div className="logo-icon">C</div>
                            <span className="logo-text">City Deals</span>
                        </div>
                        <div className="header-actions">
                            <button className="icon-btn">
                                <i className="fas fa-bell"></i>
                            </button>
                            <button className="location-btn">
                                <i className="fas fa-map-marker-alt"></i>
                                <span>Dokki</span>
                                <i className="fas fa-chevron-down" style={{fontSize: '12px'}}></i>
                            </button>
                        </div>
                    </div>
                    <p className="offers-count">16 offers available</p>
                </div>
            );
        };

        const HeroSection = () => {
            return (
                <div className="hero-section">
                    <div className="hero-stats">
                        <div className="hero-stat">
                            <span className="hero-stat-value">16</span>
                            <span className="hero-stat-label">Total Deals</span>
                        </div>
                        <div className="hero-divider" />
                        <div className="hero-stat">
                            <span className="hero-stat-value">6</span>
                            <span className="hero-stat-label">Flash Deals</span>
                        </div>
                        <div className="hero-divider" />
                        <div className="hero-stat">
                            <span className="hero-stat-value">16</span>
                            <span className="hero-stat-label">Shops</span>
                        </div>
                    </div>
                    <h2 className="hero-title">Deals in Dokki, Giza</h2>
                    <p className="hero-subtitle">16 offers available</p>
                </div>
            );
        };

        const StatsGrid = () => {
            return (
                <div className="stats-grid">
                    <h3 className="section-title-small">CATEGORIES</h3>
                    <div className="stats-row">
                        {stats.map((stat, index) => (
                            <div key={index} className="stat-card">
                                <span className="stat-value" style={{ color: stat.color }}>
                                    {stat.value}
                                </span>
                                <span className="stat-label">{stat.label}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const FlashDeals = () => {
            return (
                <div className="flash-deals-section">
                    <div className="section-header">
                        <div className="section-title-wrapper">
                            <i className="fas fa-bolt flash-icon"></i>
                            <h3 className="section-title">Flash Deals</h3>
                        </div>
                        <span className="deals-count">8 available</span>
                    </div>
                    <div className="deals-scroll">
                        {deals.map((deal) => (
                            <div key={deal.id} className="deal-card">
                                <div className="deal-image">
                                    <span className="deal-emoji">{deal.image}</span>
                                    {deal.isFlash && (
                                        <div className="flash-badge">
                                            <i className="fas fa-bolt"></i>
                                            <span>Flash</span>
                                        </div>
                                    )}
                                    <button className="favorite-btn">
                                        <i className="far fa-heart"></i>
                                    </button>
                                    {deal.discount && (
                                        <span className="discount-badge">{deal.discount}</span>
                                    )}
                                </div>
                                <div className="deal-info">
                                    <h4 className="deal-title">{deal.title}</h4>
                                    <p className="deal-shop">{deal.shop}</p>
                                    <div className="deal-location">
                                        <i className="fas fa-map-marker-alt" style={{fontSize: '12px'}}></i>
                                        <span>{deal.location}</span>
                                    </div>
                                    <div className="deal-price">
                                        <span className="price-current">EGP {deal.discountedPrice}</span>
                                        {deal.originalPrice !== deal.discountedPrice && (
                                            <span className="price-original">EGP {deal.originalPrice}</span>
                                        )}
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const CategoriesSection = () => {
            return (
                <div className="categories-section">
                    <h3 className="section-title-small">CATEGORIES</h3>
                    <div className="categories-grid">
                        {categories.map((category) => (
                            <div
                                key={category.id}
                                className="category-card"
                                style={{ backgroundColor: category.color + '20' }}
                            >
                                <div
                                    className="category-icon"
                                    style={{ backgroundColor: category.color }}
                                >
                                    <span>{category.icon}</span>
                                </div>
                                <span className="category-name">{category.name}</span>
                                <span className="category-count">{category.dealCount} deals</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // ==================== PROFILE PAGE COMPONENTS ====================

        const ProfileHeader = ({ onBack }) => {
            return (
                <div className="profile-header">
                    <button className="back-btn" onClick={onBack}>
                        <i className="fas fa-arrow-left"></i>
                    </button>
                    <div className="header-title-wrapper">
                        <i className="fas fa-user header-icon"></i>
                        <h1 className="header-title">Profile</h1>
                    </div>
                    <div className="header-spacer"></div>
                </div>
            );
        };

        const NameCard = () => {
            const [name, setName] = useState('');
            const [loading, setLoading] = useState(false);
            const [message, setMessage] = useState(null);
            const [savedName, setSavedName] = useState('');

            const handleSaveName = async () => {
                if (!name.trim()) {
                    setMessage({ type: 'error', text: 'Please enter your name' });
                    return;
                }

                setLoading(true);
                setMessage(null);

                try {
                    const { data, error } = await supabase
                        .from('profiles')
                        .insert({ name: name.trim() })
                        .select()
                        .single();

                    if (error) throw error;

                    setSavedName(data.name);
                    setName('');
                    setMessage({ type: 'success', text: 'Name saved to Supabase!' });
                } catch (err) {
                    console.error('Error:', err);
                    setMessage({ type: 'error', text: err.message || 'Failed to save name' });
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="profile-card">
                    <div className="card-header">
                        <div className="card-icon-wrapper" style={{ backgroundColor: '#e63c3c20' }}>
                            <i className="fas fa-user" style={{ color: '#e63c3c', fontSize: '20px' }}></i>
                        </div>
                        <div className="card-title-wrapper">
                            <h2 className="card-title">Your Name</h2>
                            <p className="card-subtitle">Save to Supabase</p>
                        </div>
                    </div>

                    <div className="card-body">
                        <div className="input-wrapper">
                            <input
                                type="text"
                                value={name}
                                onChange={(e) => setName(e.target.value)}
                                placeholder="Enter your name"
                                className="modern-input"
                                disabled={loading}
                            />
                        </div>

                        <button
                            className={`action-btn ${loading ? 'loading' : ''}`}
                            onClick={handleSaveName}
                            disabled={loading}
                        >
                            {loading ? (
                                <>
                                    <i className="fas fa-spinner spin"></i>
                                    <span>Saving...</span>
                                </>
                            ) : (
                                <>
                                    <i className="fas fa-save"></i>
                                    <span>Save Name</span>
                                </>
                            )
                        </button>

                        {message && (
                            <div className={`message ${message.type}`}>
                                <i className={`fas fa-${message.type === 'success' ? 'check' : 'exclamation-circle'}`}></i>
                                <span>{message.text}</span>
                            </div>
                        )}

                        {savedName && (
                            <div className="saved-info">
                                <i className="fas fa-check"></i>
                                <span>Saved: {savedName}</span>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const VideoUploadCard = ({ onUploadSuccess }) => {
            const [selectedFile, setSelectedFile] = useState(null);
            const [loading, setLoading] = useState(false);
            const [message, setMessage] = useState(null);

            const handleFileChange = (e) => {
                const file = e.target.files?.[0];
                if (file) {
                    const validTypes = ['video/mp4', 'video/quicktime', 'video/mov'];
                    if (!validTypes.includes(file.type)) {
                        setMessage({ type: 'error', text: 'Please select a valid video file (MP4 or MOV)' });
                        return;
                    }
                    setSelectedFile(file);
                    setMessage(null);
                }
            };

            const handleUpload = async () => {
                if (!selectedFile) {
                    setMessage({ type: 'error', text: 'Please select a video file' });
                    return;
                }

                setLoading(true);
                setMessage(null);

                try {
                    // Upload to Supabase Storage
                    const fileExt = selectedFile.name.split('.').pop();
                    const fileName = `${Date.now()}-${Math.random().toString(36).substring(7)}.${fileExt}`;
                    const filePath = `uploads/${fileName}`;

                    const { data: uploadData, error: uploadError } = await supabase.storage
                        .from('user-videos')
                        .upload(filePath, selectedFile, {
                            cacheControl: '3600',
                            upsert: false,
                        });

                    if (uploadError) throw uploadError;

                    // Get public URL
                    const { data: urlData } = supabase.storage
                        .from('user-videos')
                        .getPublicUrl(filePath);

                    const videoUrl = urlData.publicUrl;

                    // Save to videos table
                    const { error: dbError } = await supabase
                        .from('videos')
                        .insert({
                            video_url: videoUrl,
                            user_name: null,
                        });

                    if (dbError) throw dbError;

                    setSelectedFile(null);
                    setMessage({ type: 'success', text: 'Video uploaded to Supabase!' });
                    onUploadSuccess();
                } catch (err) {
                    console.error('Error:', err);
                    setMessage({ type: 'error', text: err.message || 'Failed to upload video' });
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="profile-card">
                    <div className="card-header">
                        <div className="card-icon-wrapper" style={{ backgroundColor: '#2196f320' }}>
                            <i className="fas fa-video" style={{ color: '#2196f3', fontSize: '20px' }}></i>
                        </div>
                        <div className="card-title-wrapper">
                            <h2 className="card-title">Upload Video</h2>
                            <p className="card-subtitle">Save to Supabase Storage</p>
                        </div>
                    </div>

                    <div className="card-body">
                        <div className="file-input-wrapper">
                            <input
                                type="file"
                                accept="video/mp4,video/quicktime,video/mov"
                                onChange={handleFileChange}
                                className="file-input"
                                id="video-upload"
                                disabled={loading}
                            />
                            <label htmlFor="video-upload" className="file-input-label">
                                <i className="fas fa-cloud-upload-alt"></i>
                                <span>{selectedFile ? selectedFile.name : 'Click to select video (MP4/MOV)'}</span>
                            </label>
                        </div>

                        {selectedFile && (
                            <div className="file-info">
                                <i className="fas fa-video"></i>
                                <span>{(selectedFile.size / 1024 / 1024).toFixed(2)} MB</span>
                            </div>
                        )}

                        <button
                            className={`action-btn ${loading ? 'loading' : ''}`}
                            onClick={handleUpload}
                            disabled={loading || !selectedFile}
                        >
                            {loading ? (
                                <>
                                    <i className="fas fa-spinner spin"></i>
                                    <span>Uploading...</span>
                                </>
                            ) : (
                                <>
                                    <i className="fas fa-upload"></i>
                                    <span>Upload Video</span>
                                </>
                            )
                        </button>

                        {message && (
                            <div className={`message ${message.type}`}>
                                <i className={`fas fa-${message.type === 'success' ? 'check' : 'exclamation-circle'}`}></i>
                                <span>{message.text}</span>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const VideosList = ({ videos, onDelete }) => {
            if (videos.length === 0) return null;

            return (
                <div className="profile-card videos-card">
                    <div className="card-header">
                        <div className="card-icon-wrapper" style={{ backgroundColor: '#ff980020' }}>
                            <i className="fas fa-play" style={{ color: '#ff9800', fontSize: '20px' }}></i>
                        </div>
                        <div className="card-title-wrapper">
                            <h2 className="card-title">Your Videos</h2>
                            <p className="card-subtitle">{videos.length} video{videos.length !== 1 ? 's' : ''}</p>
                        </div>
                    </div>

                    <div className="videos-list">
                        {videos.map((video) => (
                            <div key={video.id} className="video-item">
                                <div className="video-preview">
                                    <video
                                        src={video.video_url}
                                        className="video-thumbnail"
                                        preload="metadata"
                                    />
                                    <div className="video-play-overlay">
                                        <i className="fas fa-play"></i>
                                    </div>
                                </div>
                                <div className="video-info">
                                    <span className="video-date">
                                        {new Date(video.created_at).toLocaleDateString('en-US', {
                                            month: 'short',
                                            day: 'numeric',
                                            year: 'numeric',
                                        })}
                                    </span>
                                    <button
                                        className="delete-btn"
                                        onClick={() => onDelete(video.id)}
                                    >
                                        <i className="fas fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // ==================== BOTTOM NAVIGATION ====================

        const BottomNav = ({ activeTab, onTabChange }) => {
            const tabs = [
                { id: 'home', label: 'Home', icon: 'fa-home' },
                { id: 'explore', label: 'Explore', icon: 'fa-compass' },
                { id: 'search', label: '', icon: 'fa-search', isCenter: true },
                { id: 'saved', label: 'Saved', icon: 'fa-heart' },
                { id: 'profile', label: 'Profile', icon: 'fa-user' },
            ];

            return (
                <div className="bottom-nav">
                    {tabs.map((tab) => (
                        <button
                            key={tab.id}
                            className={`nav-item ${tab.isCenter ? 'nav-center' : ''} ${activeTab === tab.id ? 'active' : ''}`}
                            onClick={() => onTabChange(tab.id)}
                        >
                            {tab.isCenter ? (
                                <div className="nav-center-btn">
                                    <i className={`fas ${tab.icon}`}></i>
                                </div>
                            ) : (
                                <>
                                    <i className={`fas ${tab.icon}`} style={{fontSize: '20px'}}></i>
                                    <span className="nav-label">{tab.label}</span>
                                </>
                            )}
                        </button>
                    ))}
                </div>
            );
        };

        // ==================== MAIN APP ====================

        const HomePage = () => {
            return (
                <div className="page-content">
                    <HomeHeader />
                    <HeroSection />
                    <StatsGrid />
                    <FlashDeals />
                    <CategoriesSection />
                </div>
            );
        };

        const ProfilePage = ({ onBack }) => {
            const [videos, setVideos] = useState([]);
            const [loadingVideos, setLoadingVideos] = useState(false);

            const fetchVideos = useCallback(async () => {
                setLoadingVideos(true);
                try {
                    const { data, error } = await supabase
                        .from('videos')
                        .select('*')
                        .order('created_at', { ascending: false });

                    if (error) throw error;
                    setVideos(data || []);
                } catch (err) {
                    console.error('Error fetching videos:', err);
                } finally {
                    setLoadingVideos(false);
                }
            }, []);

            useEffect(() => {
                fetchVideos();
            }, [fetchVideos]);

            const handleDeleteVideo = async (id) => {
                try {
                    const { error } = await supabase
                        .from('videos')
                        .delete()
                        .eq('id', id);

                    if (error) throw error;
                    setVideos(videos.filter((v) => v.id !== id));
                } catch (err) {
                    console.error('Error deleting video:', err);
                }
            };

            return (
                <div className="page-content">
                    <ProfileHeader onBack={onBack} />
                    <div className="cards-container">
                        <NameCard />
                        <VideoUploadCard onUploadSuccess={fetchVideos} />

                        {loadingVideos ? (
                            <div className="loading-videos">
                                <i className="fas fa-spinner spin"></i>
                                <span>Loading videos...</span>
                            </div>
                        ) : (
                            <VideosList videos={videos} onDelete={handleDeleteVideo} />
                        )}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [activeTab, setActiveTab] = useState('home');

            const handleTabChange = (tab) => {
                setActiveTab(tab);
                if (tab === 'profile') {
                    setCurrentPage('profile');
                } else if (tab === 'home') {
                    setCurrentPage('home');
                }
            };

            const handleBack = () => {
                setCurrentPage('home');
                setActiveTab('home');
            };

            return (
                <div>
                    <div className="app-content">
                        {currentPage === 'home' ? (
                            <HomePage />
                        ) : (
                            <ProfilePage onBack={handleBack} />
                        )}
                    </div>
                    <BottomNav activeTab={activeTab} onTabChange={handleTabChange} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
