<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityDeals EG</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial; 
            background: #0a0a0a; 
            color: white; 
            max-width: 430px; 
            margin: 0 auto; 
            padding: 20px; 
        }
        .card { 
            background: #1e1e1e; 
            padding: 20px; 
            border-radius: 10px; 
            margin: 10px 0; 
        }
        h1 { color: #e63c3c; }
        button { 
            background: #e63c3c; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 5px; 
            cursor: pointer; 
            margin: 5px; 
        }
        input { 
            padding: 10px; 
            margin: 5px 0; 
            width: 100%; 
            border-radius: 5px; 
            border: 1px solid #333; 
            background: #0a0a0a; 
            color: white; 
        }
    </style>
</head>
<body>

    <div id="home">
        <h1>CityDeals EG</h1>
        <div class="card">
            <h2>Home</h2>
            <p>16 deals available</p>
            <button onclick="go('profile')">Profile</button>
        </div>
    </div>

    <div id="profile" style="display:none;">
        <h1>Profile</h1>
        <div class="card">
            <h2>Your Name</h2>
            <input type="text" id="name" placeholder="Enter name">
            <button onclick="save()">Save</button>
            <button onclick="go('home')">Back</button>
            <p id="msg"></p>
        </div>
    </div>

    <script>
        function go(page) {
            document.getElementById('home').style.display = 'none';
            document.getElementById('profile').style.display = 'none';
            document.getElementById(page).style.display = 'block';
        }
        function save() {
            var name = document.getElementById('name').value;
            document.getElementById('msg').innerHTML = 'Saved: ' + name;
        }
    </script>

</body>
</html>
